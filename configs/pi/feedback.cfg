# Audio feedback — M300 primitive and the event-specific melody macros.
#
# M300 is invoked by the melody macros (one note per call). pwm_cycle_time
# enforces PIN_MIN_TIME=100ms between SET_PIN calls, so each note is ≥100ms
# and successive notes have a ~100ms natural gap.

[gcode_macro M300]
description: Play a tone. S = frequency Hz (0 = silence). P = duration ms.
gcode:
    {% set S = params.S|default(1000)|int %}
    {% set P = params.P|default(100)|int %}
    {% set L = 0.5 %}
    {% if S <= 0 %}
        {% set F = 1 %}
        {% set L = 0 %}
    {% elif S >= 10000 %}
        {% set F = 0 %}
    {% else %}
        {% set F = 1/S %}
    {% endif %}
    SET_PIN PIN=BEEPER_pin VALUE={L} CYCLE_TIME={F}
    G4 P{P}
    SET_PIN PIN=BEEPER_pin VALUE=0

######################################################################
# Event melodies — invoked from the macros named in their suffix
######################################################################

# Abort (KILN_ABORT): three notes descending, final held — "denied / stopped"
[gcode_macro _KILN_ABORT_MELODY]
gcode:
    M300 S1500 P120
    M300 S800  P120
    M300 S350  P200

# Start (KILN_START_*): C5–E5–G5 ascending major triad — "go"
[gcode_macro _KILN_START_MELODY]
gcode:
    M300 S523 P120
    M300 S659 P120
    M300 S784 P150

# Segment transition (firing → holding inside _KILN_RUNNER): single chirp
[gcode_macro _KILN_SEGMENT_MELODY]
gcode:
    M300 S784 P150

# Complete (holding → complete inside _KILN_RUNNER): C5–E5–G5–C6 arpeggio
[gcode_macro _KILN_COMPLETE_MELODY]
gcode:
    M300 S523  P100
    M300 S659  P100
    M300 S784  P100
    M300 S1047 P250

# Fault (KILN_FAULT): alternating high-low siren, attention-getting
[gcode_macro _KILN_FAULT_MELODY]
gcode:
    M300 S1200 P120
    M300 S700  P120
    M300 S1200 P120
    M300 S700  P200
