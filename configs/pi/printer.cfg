# Kiln controller — initial bring-up config.
#
# MCUs:
#   [mcu]      = Voron Klipper Expander (outputs)
#   [mcu menu] = STM32_Mini12864 adapter (local UI; from include below)
#   [mcu host] = Pi linux-process MCU (exposes /dev/spidev0.0 for MAX31856)

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f042x6_240005000143534133343520-if00

[mcu host]
serial: /tmp/klipper_host_mcu

[printer]
kinematics: none
max_velocity: 1
max_accel: 1

[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]
[pause_resume]

# ----- Power outputs on the Voron Klipper Expander -----
# Pin map per canonical upstream config
# (Voron-Hardware/Klipper_Expander/Software/klipperExpander.cfg):
#   M0 = PA0, M1 = PA1, M2 = PA2, M3 = PA3 (3A MOSFET outputs)
#   T0 = PA6, T1 = PA5 (thermistor inputs)
#   PA4 = onboard status LED, PA7 = spare GPIO, PB1 = onboard neopixel
#
# M0 = PA0 → SSR gate (Altran ASR-SI480D40ZW-L, zero-cross)
# M1 = PA1 → contactor coil driver (Omron G7L)
# SSR is slow-PWM-capable for future PID; cycle_time=1.0s is friendly to a
# zero-cross SSR and well below kiln thermal time constants.
[output_pin ssr]
pin: PA0
pwm: True
cycle_time: 1.0
value: 0
shutdown_value: 0

# Contactor coil: strictly digital. The contactor exists as an independent
# disconnect; PWM here would chatter the contacts.
[output_pin contactor_coil]
pin: PA1
value: 0
shutdown_value: 0

# ----- SSR heatsink thermistor on Expander T0 (PA6) -----
# Unmarked NTC from the parts bin (measured 119kΩ at room temp → ~100K NTC,
# beta unknown). Generic 3950 is a reasonable starting curve; calibrate against
# ambient + a known reference once readings stabilize.
[temperature_sensor ssr_heatsink]
sensor_type: Generic 3950
sensor_pin: PA6
pullup_resistor: 4700
min_temp: -20
max_temp: 150

# ----- Bench test macros -----
[gcode_macro SSR_ON]
description: Turn SSR fully on (bench test only — no load until 240V testing).
gcode: SET_PIN PIN=ssr VALUE=1

[gcode_macro SSR_OFF]
description: Turn SSR off.
gcode: SET_PIN PIN=ssr VALUE=0

[gcode_macro SSR_DUTY]
description: Set SSR slow-PWM duty (0.0-1.0). Usage: SSR_DUTY V=0.25
gcode:
    {% set v = params.V|default(0)|float %}
    {% if v < 0 or v > 1 %}
        { action_raise_error("SSR_DUTY V must be 0.0-1.0") }
    {% endif %}
    SET_PIN PIN=ssr VALUE={v}

[gcode_macro COIL_ON]
description: Energize contactor coil (closes mains to SSR side).
gcode: SET_PIN PIN=contactor_coil VALUE=1

[gcode_macro COIL_OFF]
description: De-energize contactor coil (opens mains).
gcode: SET_PIN PIN=contactor_coil VALUE=0

[gcode_macro KILN_ESTOP]
description: Emergency stop — SSR off, contactor open.
gcode:
    SET_PIN PIN=ssr VALUE=0
    SET_PIN PIN=contactor_coil VALUE=0

# MAX31856 K-type thermocouple amplifier on Pi hardware SPI0.
# Wiring: CS=BCM8 (pin 24), SCK=BCM11, MOSI=BCM10, MISO=BCM9, VIN=3V3, GND=GND.
# K-type thermocouple wires: yellow=+, red=-.
[temperature_sensor kiln_chamber]
sensor_type: MAX31856
sensor_pin: host:gpio8
spi_bus: spidev0.0
tc_type: K
tc_use_50Hz_filter: False
tc_averaging_count: 1
min_temp: -50
max_temp: 1300

[include klipper-mini12864.cfg]
# ----- Mini12864 kiln status screen -----
# 16-char-wide x 4-row layout. Small font (8x14) throughout; clean two-row temp
# panel + state/uptime footer.

[display_data _kiln chamber_row]
position: 0, 0
text:
  { "Chamber  %5.1f" % printer["temperature_sensor kiln_chamber"].temperature }~degrees~C

[display_data _kiln target_row]
position: 1, 0
text:
  { "Target   -----" }~degrees~C

[display_data _kiln state]
position: 3, 0
text:
  { "%-10s" % printer.idle_timeout.state }

[display_data _kiln uptime]
position: 3, 10
text:
  { "{:02d}:{:02d}:{:02d}".format(
       (printer.toolhead.print_time | int) // 3600,
       ((printer.toolhead.print_time | int) // 60) % 60,
       (printer.toolhead.print_time | int) % 60 ) }
