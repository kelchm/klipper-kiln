# Kiln controller — initial bring-up config.
#
# MCUs:
#   [mcu]      = Voron Klipper Expander (outputs)
#   [mcu menu] = STM32_Mini12864 adapter (local UI; from include below)
#   [mcu host] = Pi linux-process MCU (exposes /dev/spidev0.0 for MAX31856)

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f042x6_240005000143534133343520-if00

[mcu host]
serial: /tmp/klipper_host_mcu

[printer]
kinematics: none
max_velocity: 1
max_accel: 1

[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]
[pause_resume]

# ----- Power outputs on the Voron Klipper Expander -----
# Pin map per canonical upstream config
# (Voron-Hardware/Klipper_Expander/Software/klipperExpander.cfg):
#   M0 = PA0, M1 = PA1, M2 = PA2, M3 = PA3 (3A MOSFET outputs)
#   T0 = PA6, T1 = PA5 (thermistor inputs)
#   PA4 = onboard status LED, PA7 = spare GPIO, PB1 = onboard neopixel
#
# M0 = PA0 → SSR gate (Altran ASR-SI480D40ZW-L, zero-cross)
# M1 = PA1 → contactor coil driver (Omron G7L)
# SSR is slow-PWM-capable for future PID; cycle_time=1.0s is friendly to a
# zero-cross SSR and well below kiln thermal time constants.
[output_pin ssr]
pin: PA0
pwm: True
cycle_time: 1.0
value: 0
shutdown_value: 0

# Contactor coil: strictly digital. The contactor exists as an independent
# disconnect; PWM here would chatter the contacts.
[output_pin contactor_coil]
pin: PA1
value: 0
shutdown_value: 0

# ----- SSR heatsink thermistor on Expander T0 (PA6) -----
# Unmarked NTC from the parts bin (measured 119kΩ at room temp → ~100K NTC,
# beta unknown). Generic 3950 is a reasonable starting curve; calibrate against
# ambient + a known reference once readings stabilize.
[temperature_sensor ssr_heatsink]
sensor_type: Generic 3950
sensor_pin: PA6
pullup_resistor: 4700
min_temp: -20
max_temp: 150

# ----- Bench test macros -----
[gcode_macro SSR_ON]
description: Turn SSR fully on (bench test only — no load until 240V testing).
gcode: SET_PIN PIN=ssr VALUE=1

[gcode_macro SSR_OFF]
description: Turn SSR off.
gcode: SET_PIN PIN=ssr VALUE=0

[gcode_macro SSR_DUTY]
description: Set SSR slow-PWM duty (0.0-1.0). Usage: SSR_DUTY V=0.25
gcode:
    {% set v = params.V|default(0)|float %}
    {% if v < 0 or v > 1 %}
        { action_raise_error("SSR_DUTY V must be 0.0-1.0") }
    {% endif %}
    SET_PIN PIN=ssr VALUE={v}

[gcode_macro COIL_ON]
description: Energize contactor coil (closes mains to SSR side).
gcode: SET_PIN PIN=contactor_coil VALUE=1

[gcode_macro COIL_OFF]
description: De-energize contactor coil (opens mains).
gcode: SET_PIN PIN=contactor_coil VALUE=0

[gcode_macro KILN_ESTOP]
description: Emergency stop — SSR off, contactor open.
gcode:
    SET_PIN PIN=ssr VALUE=0
    SET_PIN PIN=contactor_coil VALUE=0

# MAX31856 K-type thermocouple amplifier on Pi hardware SPI0.
# Wiring: CS=BCM8 (pin 24), SCK=BCM11, MOSI=BCM10, MISO=BCM9, VIN=3V3, GND=GND.
# K-type thermocouple wires: yellow=+, red=-.
[temperature_sensor kiln_chamber]
sensor_type: MAX31856
sensor_pin: host:gpio8
spi_bus: spidev0.0
tc_type: K
tc_use_50Hz_filter: False
tc_averaging_count: 1
min_temp: -50
max_temp: 1300

[include klipper-mini12864.cfg]
[include big-digits.cfg]

######################################################################
# Kiln state machine
######################################################################

# _KILN_STATE holds all kiln-related state variables. Read-only from the
# operator's perspective — mutated only via KILN_SET_STATE, KILN_SET_SETPOINT,
# KILN_FAULT, and program-control macros (TBD).
#
# Variables:
#   state                 — idle | firing | holding | cooling | complete | fault
#   setpoint_c            — current target temperature, °C (0 when idle)
#   peak_c                — highest chamber temp reached during current fire
#   fault_msg             — short fault explanation; shown on _fault group
#   program_step          — current segment index (1-based, 0 if no program)
#   program_total         — total segments in the active program
#   step_rate_c_per_hr    — current segment's ramp rate, °C/hr
#   step_target_c         — current segment's endpoint temperature, °C
[gcode_macro _KILN_STATE]
description: Internal — kiln state container. Don't call directly.
variable_state: 'idle'
variable_setpoint_c: 0.0
variable_peak_c: 0.0
variable_fault_msg: ''
variable_program_step: 0
variable_program_total: 0
variable_step_rate_c_per_hr: 0.0
variable_step_target_c: 0.0
gcode:
    # No-op. This macro exists only to hold persistent variables.

# Mapping from kiln state → display group. Used by KILN_SET_STATE and KILN_VIEW.
[gcode_macro _KILN_STATE_GROUP_FOR]
description: Internal — returns the display group name for a given state.
gcode:
    # Implemented inline via Jinja in callers; this macro is a documentation stub.

[gcode_macro KILN_SET_STATE]
description: Change the kiln state. Auto-switches the display to the matching
  view (idle/firing/complete/fault). Usage: KILN_SET_STATE STATE=firing
gcode:
    {% set s = params.STATE|default("idle")|lower %}
    {% set valid = ['idle', 'firing', 'holding', 'cooling', 'complete', 'fault'] %}
    {% if s not in valid %}
        { action_raise_error("Unknown state '%s' (expected one of: %s)" % (s, ', '.join(valid))) }
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=state VALUE='"{s}"'
    {% set group = {
        'idle':     '_idle',
        'firing':   '_firing',
        'holding':  '_firing',
        'cooling':  '_firing',
        'complete': '_complete',
        'fault':    '_fault',
    }[s] %}
    SET_DISPLAY_GROUP GROUP={group}

[gcode_macro KILN_SET_SETPOINT]
description: Set the kiln target temperature. Usage: KILN_SET_SETPOINT C=540
  or KILN_SET_SETPOINT F=1000
gcode:
    {% if 'F' in params %}
        {% set c = (params.F|float - 32.0) * 5.0/9.0 %}
    {% elif 'C' in params %}
        {% set c = params.C|float %}
    {% else %}
        { action_raise_error("Need C=<celsius> or F=<fahrenheit>") }
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=setpoint_c VALUE={c}

[gcode_macro KILN_FAULT]
description: Trip fault state. Sets fault_msg, switches display to fault view,
  and runs the emergency stop sequence. Usage: KILN_FAULT MESSAGE="TC1 open"
gcode:
    {% set msg = params.MESSAGE|default("Unknown fault")|string %}
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=fault_msg VALUE='"{msg}"'
    KILN_ESTOP
    KILN_SET_STATE STATE=fault

[gcode_macro KILN_VIEW]
description: Toggle between operator view (auto-selected by state) and the
  technician dashboard. Usage: KILN_VIEW VIEW=tech | KILN_VIEW VIEW=operator
gcode:
    {% set v = params.VIEW|default("operator")|lower %}
    {% if v == "tech" %}
        SET_DISPLAY_GROUP GROUP=_tech
    {% else %}
        {% set s = printer["gcode_macro _KILN_STATE"].state %}
        {% set group = {
            'idle':     '_idle',
            'firing':   '_firing',
            'holding':  '_firing',
            'cooling':  '_firing',
            'complete': '_complete',
            'fault':    '_fault',
        }.get(s, '_idle') %}
        SET_DISPLAY_GROUP GROUP={group}
    {% endif %}
