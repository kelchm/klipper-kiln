[mcu menu]
# Find serial path by running terminal command: ls /dev/serial/by-id/*
serial: /dev/serial/by-id/usb-Klipper_stm32f042x6_260023001243535031303120-if00

[display]
lcd_type: uc1701
spi_bus: spi1
cs_pin: menu:PA4
a0_pin: menu:PA2
rst_pin: menu:PA3
contrast: 63
display_group: _idle
encoder_pins: ^menu:PA0, ^menu:PA1
click_pin: ^!menu:PB1

[output_pin BEEPER_pin]
pin: menu:PF1
pwm: True
value: 0
shutdown_value: 0
cycle_time: 0.001
scale: 1000

[gcode_macro M300]
gcode:
    {% set S = params.S|default(1000)|int %}
    {% set P = params.P|default(100)|int %}
    SET_PIN PIN=BEEPER_pin VALUE={S} CYCLE_TIME={ 1.0/S if S > 0 else 1 }
    G4 P{P}
    SET_PIN PIN=BEEPER_pin VALUE=0

[neopixel fysetc_mini12864]
pin: menu:PA13
chain_count: 3
color_order: RGB
initial_RED: 1.0
initial_GREEN: 1.0
initial_BLUE: 1.0

######################################################################
# Display templates
#
# Headline content lives on display rows 1-2 (pixel rows 16-47), which
# vertically centers a 24-px-tall glyph within the 64-px LCD. Each headline
# is split into a _top half (row 1) and a _bot half (row 2).
#
# Horizontal centering is built into the templates: each one emits exactly
# 8 stacked-glyph slots = 16 character columns = full LCD width, padding
# with `dspace` glyphs as needed so the visible content centers in row.
######################################################################

# Big-digit chamber-temp headline. Self-centers in 16 cols. Input is °C.
[display_template _big_temp_f_top]
param_celsius: 0
text:
  {% set f = (param_celsius * 9.0/5.0 + 32) | round | int %}
  {% set s = "%d" % f %}
  {% set d = s|length %}
  {% set lpad = ((6 - d) + 1) // 2 %}
  {% set rpad = (6 - d) // 2 %}
  {%- for _ in range(lpad) -%}~dspace_top~{%- endfor -%}
  {%- for ch in s -%}
    {%- if ch == '-' -%}~dminus_top~{%- else -%}~d{ch}_top~{%- endif -%}
  {%- endfor -%}
  ~ddeg_top~~lF_top~
  {%- for _ in range(rpad) -%}~dspace_top~{%- endfor -%}

[display_template _big_temp_f_bot]
param_celsius: 0
text:
  {% set f = (param_celsius * 9.0/5.0 + 32) | round | int %}
  {% set s = "%d" % f %}
  {% set d = s|length %}
  {% set lpad = ((6 - d) + 1) // 2 %}
  {% set rpad = (6 - d) // 2 %}
  {%- for _ in range(lpad) -%}~dspace_bot~{%- endfor -%}
  {%- for ch in s -%}
    {%- if ch == '-' -%}~dminus_bot~{%- else -%}~d{ch}_bot~{%- endif -%}
  {%- endfor -%}
  ~ddeg_bot~~lF_bot~
  {%- for _ in range(rpad) -%}~dspace_bot~{%- endfor -%}

# Big-word headline. Caller passes uppercase letters as param_text;
# the display_data position handles horizontal centering since word
# length is fixed at config time.
[display_template _big_word_top]
param_text: ""
text:
  {%- for ch in param_text -%}
    {%- if ch == ' ' -%}~dspace_top~{%- else -%}~l{ch}_top~{%- endif -%}
  {%- endfor -%}

[display_template _big_word_bot]
param_text: ""
text:
  {%- for ch in param_text -%}
    {%- if ch == ' ' -%}~dspace_bot~{%- else -%}~l{ch}_bot~{%- endif -%}
  {%- endfor -%}

# Short inline temperature using default font, e.g. " 72°F"
[display_template _small_temp_f]
param_celsius: 0
text:
  {% set f = (param_celsius * 9.0/5.0 + 32) | round | int %}
  { "%3d" % f }~degrees~F

# HH:MM:SS-formatted duration (input is seconds)
[display_template _hhmmss]
param_seconds: 0
text:
  {% set t = param_seconds | int %}
  { "%02d:%02d:%02d" % (t // 3600, (t // 60) % 60, t % 60) }

######################################################################
# Group: _idle  (default at startup; kiln not firing)
#   Row 0:    small chamber temp (cool-enough check), centered
#   Rows 1-2: big "READY" (5 letters × 2 cols + 3-col pad each side → col 3)
#   Row 3:    action hint, centered ("Press to start" → 14 chars → col 1)
######################################################################

[display_data _idle chamber_label]
position: 0, 2
text:
  Chamber { render('_small_temp_f', param_celsius=printer["temperature_sensor kiln_chamber"].temperature) }

[display_data _idle headline_top]
position: 1, 3
text: { render('_big_word_top', param_text='READY') }

[display_data _idle headline_bot]
position: 2, 3
text: { render('_big_word_bot', param_text='READY') }

[display_data _idle hint]
position: 3, 1
text: Press to start

######################################################################
# Group: _firing  (program running; state in {firing, holding, cooling})
#   Row 0:    step indicator + segment type
#   Rows 1-2: BIG chamber temp
#   Row 3:    setpoint + delta from chamber
######################################################################

[display_data _firing step_label]
position: 0, 0
text:
  {% set step = printer["gcode_macro _KILN_STATE"].program_step | int %}
  {% set total = printer["gcode_macro _KILN_STATE"].program_total | int %}
  {% set st = printer["gcode_macro _KILN_STATE"].state | title %}
  {% if total %}{ "Segment %d of %d" % (step, total) }{% else %}{ "%s" % st }{% endif %}

[display_data _firing headline_top]
position: 1, 0
text: { render('_big_temp_f_top', param_celsius=printer["temperature_sensor kiln_chamber"].temperature) }

[display_data _firing headline_bot]
position: 2, 0
text: { render('_big_temp_f_bot', param_celsius=printer["temperature_sensor kiln_chamber"].temperature) }

[display_data _firing setpoint]
position: 3, 0
text:
  {% set s_c = printer["gcode_macro _KILN_STATE"].setpoint_c | float %}
  {% set c_c = printer["temperature_sensor kiln_chamber"].temperature | float %}
  {% set s_f = (s_c * 9.0/5.0 + 32) | round | int %}
  {% set c_f = (c_c * 9.0/5.0 + 32) | round | int %}
  {% set d = c_f - s_f %}
  { "Target %d" % s_f }~degrees~F{% if d|abs > 2 %}{ " %+d" % d }{% if d|abs > 15 %}!{% endif %}{% endif %}

######################################################################
# Group: _complete  (firing finished; cooling down)
#   Row 0:    peak temp reached
#   Rows 1-2: big "COMPLETE" (8 letters × 2 cols = 16 cols → col 0 fills row)
#   Row 3:    elapsed time
######################################################################

[display_data _complete peak]
position: 0, 0
text:
  {% set p_c = printer["gcode_macro _KILN_STATE"].peak_c | float %}
  {% set p_f = (p_c * 9.0/5.0 + 32) | round | int %}
  Peak { "%d" % p_f }~degrees~F

[display_data _complete headline_top]
position: 1, 0
text: { render('_big_word_top', param_text='COMPLETE') }

[display_data _complete headline_bot]
position: 2, 0
text: { render('_big_word_bot', param_text='COMPLETE') }

[display_data _complete elapsed]
position: 3, 0
text:
  Elapsed { render('_hhmmss', param_seconds=printer.idle_timeout.printing_time) }

######################################################################
# Group: _fault  (sensor or hardware fault)
#   Row 0:    last chamber temp (forensic)
#   Rows 1-2: big "FAULT" (5 letters → col 3)
#   Row 3:    fault message
######################################################################

[display_data _fault last_temp]
position: 0, 0
text:
  Last { render('_small_temp_f', param_celsius=printer["temperature_sensor kiln_chamber"].temperature) }

[display_data _fault headline_top]
position: 1, 3
text: { render('_big_word_top', param_text='FAULT') }

[display_data _fault headline_bot]
position: 2, 3
text: { render('_big_word_bot', param_text='FAULT') }

[display_data _fault message]
position: 3, 0
text:
  { printer["gcode_macro _KILN_STATE"].fault_msg | string }

######################################################################
# Group: _tech  (dense diagnostic dashboard, default font, all metrics)
######################################################################

[display_data _tech temps]
position: 0, 0
text:
  C{ render('_small_temp_f', param_celsius=printer["temperature_sensor kiln_chamber"].temperature) } H{ render('_small_temp_f', param_celsius=printer["temperature_sensor ssr_heatsink"].temperature) }

[display_data _tech setpoint]
position: 1, 0
text:
  {% set s_c = printer["gcode_macro _KILN_STATE"].setpoint_c | float %}
  {% set c_c = printer["temperature_sensor kiln_chamber"].temperature | float %}
  {% set s_f = (s_c * 9.0/5.0 + 32) | round | int %}
  {% set c_f = (c_c * 9.0/5.0 + 32) | round | int %}
  { "SP %4d dT %+4d" % (s_f, c_f - s_f) }

[display_data _tech outputs]
position: 2, 0
text:
  {% set ssr = printer["output_pin ssr"].value | float %}
  {% set coil = printer["output_pin contactor_coil"].value | float %}
  { "SSR %3d%%  Coil %s" % ((ssr * 100)|int, "ON " if coil > 0.5 else "OFF") }

[display_data _tech state_uptime]
position: 3, 0
text:
  {% set st = printer["gcode_macro _KILN_STATE"].state %}
  { "%-8s" % st }{ render('_hhmmss', param_seconds=printer.idle_timeout.printing_time) }
