# _aborted screen — brief overlay (1.5s) after KILN_ABORT, then auto-clears to idle.
#
# Rows 1-2: big "ABORTED" (7 letters × 2 cols = 14 cols → col 1)

[display_data _aborted headline_top]
position: 1, 1
text: { render('_big_word_top', param_text='ABORTED') }

[display_data _aborted headline_bot]
position: 2, 1
text: { render('_big_word_bot', param_text='ABORTED') }
