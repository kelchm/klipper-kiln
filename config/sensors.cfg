# All temperature sensors.

# MAX31856 K-type thermocouple amplifier on Pi hardware SPI0.
# Wiring: CS=BCM8 (pin 24), SCK=BCM11, MOSI=BCM10, MISO=BCM9, VIN=3V3, GND=GND.
# K-type thermocouple wires: yellow=+, red=-.
[temperature_sensor kiln_chamber]
sensor_type: MAX31856
sensor_pin: host:gpio8
spi_bus: spidev0.0
tc_type: K
tc_use_50Hz_filter: False
tc_averaging_count: 1
min_temp: -50
max_temp: 1300

# Unmarked NTC from the parts bin (measured 119kΩ at room temp → ~100K NTC,
# beta unknown). Generic 3950 is a reasonable starting curve; calibrate against
# ambient + a known reference once readings stabilize.
[temperature_sensor ssr_heatsink]
sensor_type: Generic 3950
sensor_pin: PA6
pullup_resistor: 4700
min_temp: -20
max_temp: 150

# Host + MCU internal sensors. These come for free with their respective
# chips and let us catch thermal trouble before it cascades — Pi CPU
# throttling, MCU overheating from a dying USB hub, etc.
[temperature_sensor pi_cpu]
sensor_type: temperature_host
min_temp: 0
max_temp: 90

[temperature_sensor mcu_expander]
sensor_type: temperature_mcu
sensor_mcu: mcu
min_temp: 0
max_temp: 100

[temperature_sensor mcu_menu]
sensor_type: temperature_mcu
sensor_mcu: menu
min_temp: 0
max_temp: 100
