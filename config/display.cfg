# Display subsystem: LCD hardware, encoder, neopixel, beeper, kill button,
# and the reusable [display_template] blocks that the screens/ files instantiate.
# Per-screen layouts (display_data blocks) live in screens/<screen>.cfg.

[display]
lcd_type: uc1701
spi_bus: spi1
cs_pin: menu:PA4
a0_pin: menu:PA2
rst_pin: menu:PA3
contrast: 63
display_group: _idle
encoder_pins: ^menu:PA1, ^menu:PA0
click_pin: ^!menu:PB1

# Three RGB LEDs on the Mini12864 daughter board. Driven by kiln state via
# _KILN_LEDS_UPDATE (state-machine.cfg). Initial color matches the default
# state ('idle' → soft green) so LEDs are correct from boot before any
# macro runs.
[neopixel fysetc_mini12864]
pin: menu:PA13
chain_count: 3
color_order: RGB
initial_RED: 0.0
initial_GREEN: 0.3
initial_BLUE: 0.0

# Uses [pwm_cycle_time] (not [output_pin]) because the latter doesn't flush
# CYCLE_TIME updates to the MCU at runtime — it only sets the cycle once at
# config load. pwm_cycle_time uses `set_digital_out_pwm_cycle` to actually
# reconfigure the soft-PWM period dynamically, enabling variable-pitch tones
# through SET_PIN CYCLE_TIME=...
[pwm_cycle_time BEEPER_pin]
pin: menu:PF1
value: 0
shutdown_value: 0
cycle_time: 0.001

# Physical estop button on the Mini12864 (the labeled "kill" switch).
# Bound as a gcode_button rather than klipper's kill_pin so a press
# aborts the program (SSR off, contactor open, back to idle) WITHOUT
# triggering a firmware shutdown — display + sensors keep working.
# The ^ enables the pull-up that the upstream Voron config omits, which
# fixed the spurious-shutdown-at-boot problem (see README gotcha).
[gcode_button kiln_estop]
pin: ^!menu:PF0
press_gcode:
    KILN_ABORT

######################################################################
# Display templates — reusable rendering building blocks
#
# Headline content lives on display rows 1-2 (pixel rows 16-47), which
# vertically centers a 24-px-tall glyph within the 64-px LCD. Each headline
# is split into a _top half (row 1) and a _bot half (row 2).
#
# Horizontal centering is built into the templates: each one emits exactly
# 8 stacked-glyph slots = 16 character columns = full LCD width, padding
# with `dspace` glyphs as needed so the visible content centers in row.
######################################################################

# Big-digit chamber-temp headline. Self-centers in 16 cols. Input is °C.
[display_template _big_temp_f_top]
param_celsius: 0
text:
  {% set f = (param_celsius * 9.0/5.0 + 32) | round | int %}
  {% set s = "%d" % f %}
  {% set d = s|length %}
  {% set lpad = ((6 - d) + 1) // 2 %}
  {% set rpad = (6 - d) // 2 %}
  {%- for _ in range(lpad) -%}~dspace_top~{%- endfor -%}
  {%- for ch in s -%}
    {%- if ch == '-' -%}~dminus_top~{%- else -%}~d{ch}_top~{%- endif -%}
  {%- endfor -%}
  ~ddeg_top~~lF_top~
  {%- for _ in range(rpad) -%}~dspace_top~{%- endfor -%}

[display_template _big_temp_f_bot]
param_celsius: 0
text:
  {% set f = (param_celsius * 9.0/5.0 + 32) | round | int %}
  {% set s = "%d" % f %}
  {% set d = s|length %}
  {% set lpad = ((6 - d) + 1) // 2 %}
  {% set rpad = (6 - d) // 2 %}
  {%- for _ in range(lpad) -%}~dspace_bot~{%- endfor -%}
  {%- for ch in s -%}
    {%- if ch == '-' -%}~dminus_bot~{%- else -%}~d{ch}_bot~{%- endif -%}
  {%- endfor -%}
  ~ddeg_bot~~lF_bot~
  {%- for _ in range(rpad) -%}~dspace_bot~{%- endfor -%}

# Big-word headline. Caller passes uppercase letters as param_text;
# the display_data position handles horizontal centering since word
# length is fixed at config time.
[display_template _big_word_top]
param_text: ""
text:
  {%- for ch in param_text -%}
    {%- if ch == ' ' -%}~dspace_top~{%- else -%}~l{ch}_top~{%- endif -%}
  {%- endfor -%}

[display_template _big_word_bot]
param_text: ""
text:
  {%- for ch in param_text -%}
    {%- if ch == ' ' -%}~dspace_bot~{%- else -%}~l{ch}_bot~{%- endif -%}
  {%- endfor -%}

# Short inline temperature using default font, e.g. " 72°F"
[display_template _small_temp_f]
param_celsius: 0
text:
  {% set f = (param_celsius * 9.0/5.0 + 32) | round | int %}
  { "%3d" % f }~degrees~F

# HH:MM:SS-formatted duration (input is seconds)
[display_template _hhmmss]
param_seconds: 0
text:
  {% set t = param_seconds | int %}
  { "%02d:%02d:%02d" % (t // 3600, (t // 60) % 60, t % 60) }

# Custom hand-drawn glyphs (arrows, SSR indicator) live in glyphs.cfg.
