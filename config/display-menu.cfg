# Encoder-driven menu. Suppresses the default 3D-printer items and exposes
# kiln-specific actions. Each action invokes a kiln macro and then calls
# {menu.exit()} so the LCD returns to the display group rather than staying
# stuck in menu view.

######################################################################
# Suppress the default 3D-printer menu items
######################################################################

# Klipper requires type+name even when disabling; the names won't display
# since enable is False.
[menu __main __tune]
type: list
name: -
enable: False
[menu __main __octoprint]
type: list
name: -
enable: False
[menu __main __sdcard]
type: vsdlist
name: -
enable: False
[menu __main __control]
type: list
name: -
enable: False
[menu __main __temp]
type: list
name: -
enable: False
[menu __main __filament]
type: list
name: -
enable: False
[menu __main __setup]
type: list
name: -
enable: False

######################################################################
# Kiln-specific menu items
######################################################################

[menu __main __kiln_start]
type: list
enable: {printer["gcode_macro _KILN_STATE"].state in ['idle', 'complete']}
name: Start Firing

[menu __main __kiln_start __bisque_06]
type: command
name: ^06 Bisque
gcode:
    KILN_START_BISQUE_06
    {menu.exit()}

[menu __main __kiln_start __glaze_bright_05]
type: command
name: ^5 Bright Glaze
gcode:
    KILN_START_GLAZE_BRIGHT_05
    {menu.exit()}

[menu __main __kiln_start __glaze_durable_06]
type: command
name: ^6 Durable Glaze
gcode:
    KILN_START_GLAZE_DURABLE_06
    {menu.exit()}

[menu __main __kiln_start __glaze_slowcool_06]
type: command
name: ^6 SlowCool Glaze
gcode:
    KILN_START_GLAZE_SLOWCOOL_06
    {menu.exit()}

[menu __main __kiln_start __test]
type: command
name: Test (40s)
gcode:
    KILN_START_TEST
    {menu.exit()}

[menu __main __kiln_abort]
type: command
enable: {printer["gcode_macro _KILN_STATE"].state in ['firing', 'holding', 'cooling']}
name: Abort Program
gcode:
    KILN_ABORT
    {menu.exit()}

[menu __main __kiln_reset_complete]
type: command
enable: {printer["gcode_macro _KILN_STATE"].state == 'complete'}
name: Acknowledge / Reset
gcode:
    KILN_SET_STATE STATE=idle
    {menu.exit()}

[menu __main __kiln_clear_fault]
type: command
enable: {printer["gcode_macro _KILN_STATE"].state == 'fault'}
name: Clear Fault
gcode:
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=fault_msg VALUE='""'
    KILN_SET_STATE STATE=idle
    {menu.exit()}

[menu __main __kiln_view_toggle]
type: command
name: {% if printer["gcode_macro _KILN_STATE"].view == 'tech' %}Operator View{% else %}Diagnostic View{% endif %}
gcode:
    KILN_VIEW_TOGGLE
    {menu.exit()}

# Network mode toggle. Selecting either of these drops every active Mainsail/
# SSH connection — make sure you're physically near the Pi before you commit.
[menu __main __wifi]
type: list
name: WiFi Mode

[menu __main __wifi __kiln_ap]
type: command
name: Kiln AP
gcode:
    WIFI_KILN_AP
    {menu.exit()}

[menu __main __wifi __home]
type: command
name: Home
gcode:
    WIFI_HOME
    {menu.exit()}
