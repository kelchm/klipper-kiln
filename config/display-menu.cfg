# Encoder-driven menu. Suppresses the default 3D-printer items and exposes
# kiln-specific actions. Each action invokes a kiln macro and then calls
# {menu.exit()} so the LCD returns to the display group rather than staying
# stuck in menu view.

######################################################################
# Suppress the default 3D-printer menu items
######################################################################

# Klipper requires type+name even when disabling; the names won't display
# since enable is False.
[menu __main __tune]
type: list
name: -
enable: False
[menu __main __octoprint]
type: list
name: -
enable: False
[menu __main __sdcard]
type: vsdlist
name: -
enable: False
[menu __main __control]
type: list
name: -
enable: False
[menu __main __temp]
type: list
name: -
enable: False
[menu __main __filament]
type: list
name: -
enable: False
[menu __main __setup]
type: list
name: -
enable: False

######################################################################
# Kiln-specific menu items
######################################################################

[menu __main __kiln_start]
type: list
enable: {printer["gcode_macro _KILN_STATE"].state in ['idle', 'complete']}
name: Start firing

[menu __main __kiln_start __bisque_06]
type: command
name: Bisque ^06
gcode:
    KILN_START_BISQUE_06
    {menu.exit()}

[menu __main __kiln_start __glaze_5_bright]
type: command
name: Glaze ^5 Bright
gcode:
    KILN_START_GLAZE_5_BRIGHT
    {menu.exit()}

[menu __main __kiln_start __glaze_6_durable]
type: command
name: Glaze ^6 Durable
gcode:
    KILN_START_GLAZE_6_DURABLE
    {menu.exit()}

[menu __main __kiln_start __glaze_6_slow_cool]
type: command
name: Glaze ^6 SlowCool
gcode:
    KILN_START_GLAZE_6_SLOW_COOL
    {menu.exit()}

[menu __main __kiln_start __test]
type: command
name: Test (~40s)
gcode:
    KILN_START_TEST
    {menu.exit()}

[menu __main __kiln_abort]
type: command
enable: {printer["gcode_macro _KILN_STATE"].state in ['firing', 'holding', 'cooling']}
name: Abort program
gcode:
    KILN_ABORT
    {menu.exit()}

[menu __main __kiln_reset_complete]
type: command
enable: {printer["gcode_macro _KILN_STATE"].state == 'complete'}
name: Acknowledge / reset
gcode:
    KILN_SET_STATE STATE=idle
    {menu.exit()}

[menu __main __kiln_clear_fault]
type: command
enable: {printer["gcode_macro _KILN_STATE"].state == 'fault'}
name: Clear fault
gcode:
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=fault_msg VALUE='""'
    KILN_SET_STATE STATE=idle
    {menu.exit()}

[menu __main __kiln_view_tech]
type: command
name: Diagnostic view
gcode:
    KILN_VIEW VIEW=tech
    {menu.exit()}

[menu __main __kiln_view_op]
type: command
name: Operator view
gcode:
    KILN_VIEW VIEW=operator
    {menu.exit()}

# Network mode toggle. Selecting either of these drops every active Mainsail/
# SSH connection — make sure you're physically near the Pi before you commit.
[menu __main __wifi_kiln_ap]
type: command
name: WiFi: Kiln AP
gcode:
    WIFI_KILN_AP
    {menu.exit()}

[menu __main __wifi_home]
type: command
name: WiFi: Home
gcode:
    WIFI_HOME
    {menu.exit()}
