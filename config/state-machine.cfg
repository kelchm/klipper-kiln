# Kiln state machine.
#
# _KILN_STATE holds all kiln-related variables. Read-only from the
# operator's perspective — mutated only via the public KILN_* macros below
# and by the program runner.
#
# Variables:
#   state                     — idle | firing | holding | cooling | complete | fault
#   setpoint_c                — current target temperature, °C (0 when idle)
#   peak_c                    — highest chamber temp reached during the fire
#   fault_msg                 — short fault explanation; shown on _fault screen
#   program_name              — display label for the running program ('' if none)
#   program_step              — current segment index (1-based, 0 if no program)
#   program_total             — total segments in the active program
#   segment_rates_c_per_hr    — list of ramp rates, one per segment (°C/hr; 0 = cool-wait)
#   segment_targets_c         — list of endpoint temperatures, one per segment (°C)
#   segment_holds_s           — list of hold durations after reaching target (seconds)
#   segment_names             — list of short labels (one per segment) for the display
#   program_start_time        — toolhead.estimated_print_time when program kicked off
#   segment_start_time        — same clock, set when current ramp or hold phase began
#   segment_start_setpoint_c  — setpoint at segment start (for ramp progress calc)
[gcode_macro _KILN_STATE]
description: Internal — kiln state container. Don't call directly.
variable_state: 'idle'
variable_setpoint_c: 0.0
variable_peak_c: 0.0
variable_fault_msg: ''
variable_program_name: ''
variable_program_step: 0
variable_program_total: 0
variable_segment_rates_c_per_hr: []
variable_segment_targets_c: []
variable_segment_holds_s: []
variable_segment_names: []
variable_program_start_time: 0.0
variable_segment_start_time: 0.0
variable_segment_start_setpoint_c: 0.0
gcode:
    # No-op. This macro exists only to hold persistent variables.

[gcode_macro KILN_SET_STATE]
description: Change the kiln state. Auto-switches the display to the matching
  screen (idle/firing/complete/fault) and updates the neopixel color.
  Usage: KILN_SET_STATE STATE=firing
gcode:
    {% set s = params.STATE|default("idle")|lower %}
    {% set valid = ['idle', 'firing', 'holding', 'cooling', 'complete', 'fault'] %}
    {% if s not in valid %}
        { action_raise_error("Unknown state '%s' (expected one of: %s)" % (s, ', '.join(valid))) }
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=state VALUE='"{s}"'
    {% set group = {
        'idle':     '_idle',
        'firing':   '_firing',
        'holding':  '_firing',
        'cooling':  '_firing',
        'complete': '_complete',
        'fault':    '_fault',
    }[s] %}
    SET_DISPLAY_GROUP GROUP={group}
    _KILN_LEDS_UPDATE STATE={s}

[gcode_macro KILN_SET_SETPOINT]
description: Set the kiln target temperature. Usage: KILN_SET_SETPOINT C=540
  or KILN_SET_SETPOINT F=1000
gcode:
    {% if 'F' in params %}
        {% set c = (params.F|float - 32.0) * 5.0/9.0 %}
    {% elif 'C' in params %}
        {% set c = params.C|float %}
    {% else %}
        { action_raise_error("Need C=<celsius> or F=<fahrenheit>") }
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=setpoint_c VALUE={c}

[gcode_macro KILN_VIEW]
description: Toggle between operator view (auto-selected by state) and the
  technician dashboard. Usage: KILN_VIEW VIEW=tech | KILN_VIEW VIEW=operator
gcode:
    {% set v = params.VIEW|default("operator")|lower %}
    {% if v == "tech" %}
        SET_DISPLAY_GROUP GROUP=_tech
    {% else %}
        {% set s = printer["gcode_macro _KILN_STATE"].state %}
        {% set group = {
            'idle':     '_idle',
            'firing':   '_firing',
            'holding':  '_firing',
            'cooling':  '_firing',
            'complete': '_complete',
            'fault':    '_fault',
        }.get(s, '_idle') %}
        SET_DISPLAY_GROUP GROUP={group}
    {% endif %}

# Drives the Mini12864 neopixels by kiln state. Colors are intentionally dim —
# these LEDs sit right next to the LCD and get blinding at full brightness.
#   idle     → soft green   (safe, ready to use)
#   firing   → amber         (climbing toward target)
#   holding  → orange        (at temp, holding)
#   cooling  → blue          (passive cooldown)
#   complete → bright green  (program done, may still be hot)
#   fault    → red           (something is wrong)
[gcode_macro _KILN_LEDS_UPDATE]
description: Internal — set neopixel color for a given kiln state.
gcode:
    {% set s = params.STATE|default("idle")|lower %}
    {% set colors = {
        'idle':     (0.00, 0.30, 0.00),
        'firing':   (0.60, 0.20, 0.00),
        'holding':  (0.60, 0.15, 0.00),
        'cooling':  (0.00, 0.10, 0.40),
        'complete': (0.00, 0.60, 0.00),
        'fault':    (0.80, 0.00, 0.00),
    } %}
    {% set rgb = colors.get(s, (0.10, 0.10, 0.10)) %}
    SET_LED LED=fysetc_mini12864 RED={rgb[0]} GREEN={rgb[1]} BLUE={rgb[2]}
