# Network mode toggle — switch the Pi's WiFi between client mode (home
# network) and AP mode (Pi hosts its own "kiln" SSID for use at the kiln
# location). Single radio means the two modes are mutually exclusive.
#
# Requires:
#   - klippy/extras/gcode_shell_command.py installed (see README "Bring-up")
#   - /etc/sudoers.d/099-klipper-nmcli granting passwordless nmcli for the
#     specific connection names below
#
# Switching networks instantly drops every Mainsail/SSH connection — the Pi
# itself keeps running. Make sure you can physically reach the Pi before
# triggering a mode switch you might not be able to undo remotely.

[gcode_shell_command _wifi_ap]
command: sudo nmcli connection up kiln-ap
timeout: 10.
verbose: True

[gcode_shell_command _wifi_home]
command: sudo nmcli connection up netplan-wlan0-Kelch
timeout: 15.
verbose: True

[gcode_macro WIFI_KILN_AP]
description: Switch WiFi to AP mode — Pi hosts "kiln" SSID. Disconnects
  any active home-WiFi sessions. Use at the kiln location where home WiFi
  isn't available.
gcode:
    RUN_SHELL_COMMAND CMD=_wifi_ap

[gcode_macro WIFI_HOME]
description: Switch WiFi to home network (client mode). Disconnects any
  active AP-mode sessions.
gcode:
    RUN_SHELL_COMMAND CMD=_wifi_home
