# _cooling screen — shown while a passive cool-wait segment is running.
# Same layout as _firing so the operator's eye doesn't have to re-learn the
# screen — only the bottom row differs ("Cool to X°F" instead of "Target").
#
# Row 0:    step indicator (same as _firing)
# Rows 1-2: BIG chamber temp (same as _firing)
# Row 3:    cool-wait threshold ("Cool to X°F")

[display_data _cooling step_label]
position: 0, 0
text:
  {% set step = printer["gcode_macro _KILN_STATE"].program_step | int %}
  {% set total = printer["gcode_macro _KILN_STATE"].program_total | int %}
  {% if total %}{ "Segment %d of %d" % (step, total) }{% else %}Cooling{% endif %}

[display_data _cooling headline_top]
position: 1, 0
text: { render('_big_temp_f_top', param_celsius=printer["heater_generic kiln"].temperature) }

[display_data _cooling headline_bot]
position: 2, 0
text: { render('_big_temp_f_bot', param_celsius=printer["heater_generic kiln"].temperature) }

[display_data _cooling threshold]
position: 3, 0
text:
  {% set ks = printer["gcode_macro _KILN_STATE"] %}
  {% set step = ks.program_step | int %}
  {% set total = ks.program_total | int %}
  {% if step >= 1 and step <= total %}
    {% set t_c = ks.segment_targets_c[step - 1] | float %}
    {% set t_f = (t_c * 9.0/5.0 + 32) | round | int %}
    { "Cool to %d" % t_f }~degrees~F
  {% else %}
    Cooling
  {% endif %}
