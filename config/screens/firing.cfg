# _firing screen — shown for any active program (firing/holding/cooling).
#
#   Row 0:    <program_name><pad><N/M>      static
#   Rows 1-2: BIG chamber temp + SSR overlay  always-on
#   Row 3:    static phase-aware status line:
#               Ramp ↑ <target>°F     ascending ramp
#               Cool ↓ <target>°F     active descending ramp
#               Wait ↓ <target>°F     passive cool-wait (rate=0)
#               <Nm> @ <target>°F     during the hold phase of a segment
#
#             Lag warning: during an active ramp (Ramp or Cool), when
#             |chamber − setpoint| exceeds _KILN_STATE.lag_warn_threshold_f
#             (default 100°F) a ‼ (CP437 \x13) appears at row 3 col 15,
#             blinking 1Hz. Independent widget, doesn't shift the phase line.

[display_data _firing row0]
position: 0, 0
text:
  {% set ks = printer["gcode_macro _KILN_STATE"] %}
  {% set total = ks.program_total | int %}
  {% if total %}
    {% set step = ks.program_step | int %}
    {% set name = ks.program_name %}
    {% set counter = "%d/%d" % (step, total) %}
    {% set padding = 16 - name|length - counter|length %}
    {% if padding < 1 %}{% set padding = 1 %}{% endif %}
    { "%s%s%s" % (name, ' ' * padding, counter) }
  {% else %}
    { "%s" % (ks.state | title) }
  {% endif %}

[display_data _firing headline_top]
position: 1, 0
text: { render('_big_temp_f_top', param_celsius=printer["heater_generic kiln"].temperature) }

[display_data _firing headline_bot]
position: 2, 0
text: { render('_big_temp_f_bot', param_celsius=printer["heater_generic kiln"].temperature) }

# SSR status indicator — disc in the left dspace slot of the big-digit
# row. Filled when heater is currently pulling power, outline when not.
# Always rendered so col 0 carries continuous heater status.
[display_data _firing ssr_top]
position: 1, 0
text:
  {% if (printer["heater_generic kiln"].power | float) > 0 %}~ssr_on_top~{% else %}~ssr_off_top~{% endif %}

[display_data _firing ssr_bot]
position: 2, 0
text:
  {% if (printer["heater_generic kiln"].power | float) > 0 %}~ssr_on_bot~{% else %}~ssr_off_bot~{% endif %}

[display_data _firing row3]
position: 3, 0
text:
  {% set ks = printer["gcode_macro _KILN_STATE"] %}
  {% set step = ks.program_step | int %}
  {% set total = ks.program_total | int %}
  {% if step >= 1 and step <= total %}
    {% set rate = ks.segment_rates_c_per_hr[step - 1] | float %}
    {% set target_c = ks.segment_targets_c[step - 1] | float %}
    {% set target_f = (target_c * 9.0/5.0 + 32) | round | int %}
    {% set start_c = ks.segment_start_setpoint_c | float %}
    {% if ks.state == 'holding' %}
      {% set elapsed_h = printer.toolhead.estimated_print_time - ks.segment_start_time %}
      {% set remaining = (ks.segment_holds_s[step - 1] | float - elapsed_h) | int %}
      {% if remaining >= 60 %}
        {% set core = "%dm @ %d" % (remaining // 60, target_f) %}
      {% else %}
        {% set core = "%ds @ %d" % (remaining, target_f) %}
      {% endif %}
    {% elif rate == 0 %}
      {% set core = "Wait \x19 %d" % target_f %}
    {% elif target_c < start_c %}
      {% set core = "Cool \x19 %d" % target_f %}
    {% else %}
      {% set core = "Ramp \x18 %d" % target_f %}
    {% endif %}
    {% set lead = (16 - core|length - 2) // 2 %}
    {% if lead < 0 %}{% set lead = 0 %}{% endif %}
    { "%s%s" % (' ' * lead, core) }~degrees~F
  {% endif %}

# Lag warning: ‼ at row 3 right edge when |chamber − setpoint| exceeds the
# lag_warn_threshold_f variable (default 100°F) during an active ramp.
# Blinks 1Hz. Independent widget so the centered phase line never shifts.
# Always emits a char (‼ or space) so col 15 never carries stale content.
[display_data _firing lag_warn]
position: 3, 15
text:
  {% set ks = printer["gcode_macro _KILN_STATE"] %}
  {% set step = ks.program_step | int %}
  {% set total = ks.program_total | int %}
  {% if step >= 1 and step <= total and ks.state != 'holding' and (ks.segment_rates_c_per_hr[step - 1] | float) != 0 %}
    {% set chamber_f = (printer["heater_generic kiln"].temperature * 9.0/5.0 + 32) | round | int %}
    {% set sp_f = (ks.setpoint_c * 9.0/5.0 + 32) | round | int %}
    {% set threshold = ks.lag_warn_threshold_f | int %}
    {% set blink_on = (printer.toolhead.estimated_print_time | int) % 2 == 0 %}
    {% if ((chamber_f - sp_f) | abs) > threshold and blink_on %}{ "\x13" }{% else %}{ " " }{% endif %}
  {% else %}
    { " " }
  {% endif %}
