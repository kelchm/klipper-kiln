# _firing screen — shown while a program is active (firing/holding/cooling).
#
# Row 0:    step indicator + segment type
# Rows 1-2: BIG chamber temp
# Row 3:    setpoint + delta from chamber

[display_data _firing step_label]
position: 0, 0
text:
  {% set step = printer["gcode_macro _KILN_STATE"].program_step | int %}
  {% set total = printer["gcode_macro _KILN_STATE"].program_total | int %}
  {% set st = printer["gcode_macro _KILN_STATE"].state | title %}
  {% if total %}{ "Segment %d of %d" % (step, total) }{% else %}{ "%s" % st }{% endif %}

[display_data _firing headline_top]
position: 1, 0
text: { render('_big_temp_f_top', param_celsius=printer["heater_generic kiln"].temperature) }

[display_data _firing headline_bot]
position: 2, 0
text: { render('_big_temp_f_bot', param_celsius=printer["heater_generic kiln"].temperature) }

[display_data _firing setpoint]
position: 3, 0
text:
  {% set s_c = printer["gcode_macro _KILN_STATE"].setpoint_c | float %}
  {% set c_c = printer["heater_generic kiln"].temperature | float %}
  {% set s_f = (s_c * 9.0/5.0 + 32) | round | int %}
  {% set c_f = (c_c * 9.0/5.0 + 32) | round | int %}
  {% set d = c_f - s_f %}
  { "Target %d" % s_f }~degrees~F{% if d|abs > 2 %}{ " %+d" % d }{% if d|abs > 15 %}!{% endif %}{% endif %}
