# _firing screen — shown for any active program (firing/holding/cooling).
# Designed to answer three operator questions at-a-glance:
#   1. Is the heater currently driving the SSR? — ssr_on overlay in the
#      left spare slot of the big-digit row, on when power > 0.
#   2. Is the controller actually doing something / is the screen frozen?
#      — a tiny tick character on row 0 that toggles each second, plus
#      the SSR indicator blinking during normal watermark cycling.
#   3. Is the kiln keeping up with the schedule? — row 3 shows the
#      schedule's intended rate and the chamber's current lag from the
#      moving setpoint.
#
# Row 0:    "<program_name><pad><N/M><tick>"
# Rows 1-2: BIG chamber temp + SSR-on overlay in left slot
# Row 3:    rate + lag during ramp / hold countdown / cool-wait threshold

[display_data _firing step_label]
position: 0, 0
text:
  {% set ks = printer["gcode_macro _KILN_STATE"] %}
  {% set step = ks.program_step | int %}
  {% set total = ks.program_total | int %}
  {% if total %}
    {% set name = ks.program_name %}
    {% set counter = "%d/%d" % (step, total) %}
    {% set t = printer.toolhead.estimated_print_time | int %}
    {% set tick = '.' if (t % 2 == 0) else ' ' %}
    {% set padding = 16 - name|length - counter|length - 1 %}
    {% if padding < 1 %}{% set padding = 1 %}{% endif %}
    { "%s%s%s%s" % (name, ' ' * padding, counter, tick) }
  {% else %}
    { "%s" % (ks.state | title) }
  {% endif %}

[display_data _firing headline_top]
position: 1, 0
text: { render('_big_temp_f_top', param_celsius=printer["heater_generic kiln"].temperature) }

[display_data _firing headline_bot]
position: 2, 0
text: { render('_big_temp_f_bot', param_celsius=printer["heater_generic kiln"].temperature) }

# SSR-on overlay — fills the left dspace slot of the big-digit row when
# the heater is currently driving power. Empty text when power == 0 lets
# the underlying dspace show through.
[display_data _firing ssr_top]
position: 1, 0
text:
  {% if (printer["heater_generic kiln"].power | float) > 0 %}~ssr_on_top~{% endif %}

[display_data _firing ssr_bot]
position: 2, 0
text:
  {% if (printer["heater_generic kiln"].power | float) > 0 %}~ssr_on_bot~{% endif %}

[display_data _firing phase]
position: 3, 0
text:
  {% set ks = printer["gcode_macro _KILN_STATE"] %}
  {% set step = ks.program_step | int %}
  {% set total = ks.program_total | int %}
  {% if step >= 1 and step <= total %}
    {% set rate = ks.segment_rates_c_per_hr[step - 1] | float %}
    {% set target_c = ks.segment_targets_c[step - 1] | float %}
    {% set target_f = (target_c * 9.0/5.0 + 32) | round | int %}
    {% set hold_s = ks.segment_holds_s[step - 1] | float %}
    {% set chamber_c = printer["heater_generic kiln"].temperature | float %}
    {% set chamber_f = (chamber_c * 9.0/5.0 + 32) | round | int %}
    {% set sp_c = ks.setpoint_c | float %}
    {% set sp_f = (sp_c * 9.0/5.0 + 32) | round | int %}
    {% if rate == 0 %}
      { "Cool to %d" % target_f }~degrees~F
    {% elif ks.state == 'holding' %}
      {% set elapsed = printer.toolhead.estimated_print_time - ks.segment_start_time %}
      {% set remaining = (hold_s - elapsed) | int %}
      {% if remaining >= 60 %}
        { "Hold %dm left" % (remaining // 60) }
      {% else %}
        { "Hold %ds left" % remaining }
      {% endif %}
    {% else %}
      {% set rate_f = (rate * 9.0/5.0) | round | int %}
      {% set lag = chamber_f - sp_f %}
      {% set going_up = target_c >= (ks.segment_start_setpoint_c | float) %}
      {% set arrow = "\x18" if going_up else "\x19" %}
      { "%s %d" % (arrow, rate_f) }~degrees~F/h{% if lag|abs > 2 %}{ " %+d" % lag }{% endif %}
    {% endif %}
  {% endif %}
