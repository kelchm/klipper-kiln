# _complete screen — shown after firing finishes, while still cooling.
#
#   Row 0:    <program_name><pad><NhMm>     name + elapsed (no inner space)
#   Rows 1-2: BIG "COMPLETE"
#   Row 3:    ↑<peak>°F   →<current>°F     glyph-prefixed: ↑=rose to, →=now

[display_data _complete name_elapsed]
position: 0, 0
text:
  {% set ks = printer["gcode_macro _KILN_STATE"] %}
  {% set name = ks.program_name %}
  {% set start = ks.program_start_time | float %}
  {% if start > 0 %}
    {% set elapsed_s = (printer.toolhead.estimated_print_time - start) | int %}
  {% else %}
    {% set elapsed_s = 0 %}
  {% endif %}
  {% set hours = elapsed_s // 3600 %}
  {% set mins = (elapsed_s % 3600) // 60 %}
  {% set elapsed_str = "%dh%dm" % (hours, mins) %}
  {% set padding = 16 - name|length - elapsed_str|length %}
  {% if padding < 1 %}{% set padding = 1 %}{% endif %}
  { "%s%s%s" % (name, ' ' * padding, elapsed_str) }

[display_data _complete headline_top]
position: 1, 0
text: { render('_big_word_top', param_text='COMPLETE') }

[display_data _complete headline_bot]
position: 2, 0
text: { render('_big_word_bot', param_text='COMPLETE') }

[display_data _complete temps]
position: 3, 0
text:
  {% set ks = printer["gcode_macro _KILN_STATE"] %}
  {% set p_c = ks.peak_c | float %}
  {% set p_f = (p_c * 9.0/5.0 + 32) | round | int %}
  {% set chamber_c = printer["heater_generic kiln"].temperature | float %}
  {% set chamber_f = (chamber_c * 9.0/5.0 + 32) | round | int %}
  {% set peak_str = "%d" % p_f %}
  {% set cur_str = "%d" % chamber_f %}
  # peak block:    \x18 + digits + °F  →  1 + len + 2
  # current block: \x1a + digits + °F  →  1 + len + 2
  {% set gap = 16 - (1 + peak_str|length + 2) - (1 + cur_str|length + 2) %}
  {% if gap < 1 %}{% set gap = 1 %}{% endif %}
  { "\x18%s" % peak_str }~degrees~F{ "%s\x1a%s" % (' ' * gap, cur_str) }~degrees~F
