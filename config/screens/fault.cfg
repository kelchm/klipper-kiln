# _fault screen — shown when KILN_FAULT trips.
#
# Row 0:    last chamber temp (forensic)
# Rows 1-2: big "FAULT" (5 letters → col 3)
# Row 3:    fault message

[display_data _fault last_temp]
position: 0, 0
text:
  Last { render('_small_temp_f', param_celsius=printer["temperature_sensor kiln_chamber"].temperature) }

[display_data _fault headline_top]
position: 1, 3
text: { render('_big_word_top', param_text='FAULT') }

[display_data _fault headline_bot]
position: 2, 3
text: { render('_big_word_bot', param_text='FAULT') }

[display_data _fault message]
position: 3, 0
text:
  { printer["gcode_macro _KILN_STATE"].fault_msg | string }
