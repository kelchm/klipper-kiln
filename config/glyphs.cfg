# Hand-drawn custom [display_glyph] definitions used by the operator screens.
# Each glyph is 16×16 px. Glyphs that visually span both halves of the big-
# digit headline row come as _top/_bot pairs — Klipper stacks them as one
# 16×32 px composite when both are placed at adjacent display rows.
#
# Programmatically-generated digit glyphs (used by the big-temp/big-word
# templates) live in big-digits.generated.cfg, not here.

