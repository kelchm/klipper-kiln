# Program runner — generic engine that walks a list of ramp+hold segments.
# Individual program parameters live in programs/*.cfg; this file is the
# engine they share.
#
# Each segment has rate (°C/hr), target (°C), and hold duration (seconds).
# Two segment shapes:
#
#   Ramp segment   (rate > 0): drive setpoint from previous toward target at
#                  the given rate (direction inferred from target vs current
#                  setpoint), then hold at target for the hold duration.
#                  state = firing during ramp, holding during hold.
#
#   Cool-wait      (rate == 0): heater off, wait for chamber to passively
#                  cool below the target temperature. hold is ignored.
#                  state = cooling for the duration of this segment.
#                  Conventionally the last segment of any program that
#                  finishes hot — the operator's "safe to crack the lid"
#                  signal is when this segment advances to complete.
#
# Programs populate the segment lists in _KILN_STATE then call
# _KILN_PROGRAM_START.
#
# Every update to setpoint_c is mirrored to SET_HEATER_TEMPERATURE so the
# heater's control loop tracks. setpoint_c is "what the program thinks";
# the heater's .target is "what Klipper is steering toward." They agree by
# construction.
#
# Program macro naming convention: KILN_START_<TYPE>[_<VARIANT>][_<CONE>]
#   e.g. KILN_START_BISQUE_06, KILN_START_GLAZE_BRIGHT_05.
# The cone number — if present — must be the trailing token. Klipper's
# gcode parser splits command names at digit boundaries (legacy "G1 X10"
# heritage: G + 1 + arg), so any letters AFTER digits get peeled off as
# parameters and the command becomes "Unknown". Cone-last keeps us safe.

[gcode_macro _KILN_PROGRAM_START]
description: Internal — common program-start setup. Programs call this after
  populating program_name, program_total, and the segment_* lists in
  _KILN_STATE.
gcode:
    UPDATE_DELAYED_GCODE ID=_KILN_RUNNER DURATION=0
    {% set ks = printer["gcode_macro _KILN_STATE"] %}
    {% set now = printer.toolhead.estimated_print_time %}
    {% set chamber_c = printer["heater_generic kiln"].temperature %}
    {% set seg1_rate = ks.segment_rates_c_per_hr[0] | float %}
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_step VALUE=1
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_start_time VALUE={now}
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_start_time VALUE={now}
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_start_setpoint_c VALUE={chamber_c}
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=setpoint_c VALUE={chamber_c}
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=peak_c VALUE={chamber_c}
    {% if seg1_rate == 0 %}
        SET_HEATER_TEMPERATURE HEATER=kiln TARGET=0
        KILN_SET_STATE STATE=cooling
    {% else %}
        KILN_SET_STATE STATE=firing
    {% endif %}
    _KILN_START_MELODY
    UPDATE_DELAYED_GCODE ID=_KILN_RUNNER DURATION=1

[delayed_gcode _KILN_RUNNER]
gcode:
    {% set ks = printer["gcode_macro _KILN_STATE"] %}
    {% set st = ks.state %}
    {% set now = printer.toolhead.estimated_print_time %}
    {% set chamber_c = printer["heater_generic kiln"].temperature %}
    {% set step = ks.program_step | int %}
    {% set total = ks.program_total | int %}
    # Track peak across active states
    {% if st in ['firing', 'holding'] and chamber_c > ks.peak_c %}
        SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=peak_c VALUE={chamber_c}
    {% endif %}
    {% if st == 'firing' and step >= 1 and step <= total %}
        {% set rate = ks.segment_rates_c_per_hr[step - 1] | float %}
        {% set target = ks.segment_targets_c[step - 1] | float %}
        {% set start_sp = ks.segment_start_setpoint_c | float %}
        {% set elapsed = now - ks.segment_start_time %}
        {% set delta = rate * elapsed / 3600.0 %}
        {% if target >= start_sp %}
            # Ramp up
            {% set new_sp = start_sp + delta %}
            {% set reached = new_sp >= target %}
        {% else %}
            # Ramp down (e.g. drop-and-hold, controlled slow cool)
            {% set new_sp = start_sp - delta %}
            {% set reached = new_sp <= target %}
        {% endif %}
        {% if reached %}
            SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=setpoint_c VALUE={target}
            SET_HEATER_TEMPERATURE HEATER=kiln TARGET={target}
            SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_start_time VALUE={now}
            KILN_SET_STATE STATE=holding
            _KILN_SEGMENT_MELODY
        {% else %}
            SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=setpoint_c VALUE={new_sp}
            SET_HEATER_TEMPERATURE HEATER=kiln TARGET={new_sp}
        {% endif %}
    {% elif st == 'holding' and step >= 1 and step <= total %}
        {% set hold_s = ks.segment_holds_s[step - 1] | float %}
        {% set elapsed = now - ks.segment_start_time %}
        {% if elapsed >= hold_s %}
            {% set next_step = step + 1 %}
            {% if next_step > total %}
                # Last segment done — program complete
                KILN_SET_STATE STATE=complete
                SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=setpoint_c VALUE=0
                SET_HEATER_TEMPERATURE HEATER=kiln TARGET=0
                _KILN_COMPLETE_MELODY
            {% else %}
                # Advance to next segment
                {% set next_rate = ks.segment_rates_c_per_hr[next_step - 1] | float %}
                {% set current_sp = ks.setpoint_c | float %}
                SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_step VALUE={next_step}
                SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_start_setpoint_c VALUE={current_sp}
                SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_start_time VALUE={now}
                {% if next_rate == 0 %}
                    # Entering passive cool-wait — heater off, screen will
                    # show chamber temp vs threshold. _KILN_COMPLETE_MELODY
                    # plays here because heat-phase has ended; a second
                    # cue plays when chamber crosses the threshold.
                    SET_HEATER_TEMPERATURE HEATER=kiln TARGET=0
                    KILN_SET_STATE STATE=cooling
                    _KILN_COMPLETE_MELODY
                {% else %}
                    KILN_SET_STATE STATE=firing
                    _KILN_SEGMENT_MELODY
                {% endif %}
            {% endif %}
        {% endif %}
    {% elif st == 'cooling' and step >= 1 and step <= total %}
        # Cool-wait segment: heater off, waiting for chamber to drop below
        # the segment's target temperature. Advances on chamber temp, not
        # on a timer. Conventionally the last segment, in which case the
        # next advance is to state=complete (kiln cool enough to crack lid).
        {% set target = ks.segment_targets_c[step - 1] | float %}
        {% if chamber_c < target %}
            {% set next_step = step + 1 %}
            {% if next_step > total %}
                KILN_SET_STATE STATE=complete
                SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=setpoint_c VALUE=0
                _KILN_COMPLETE_MELODY
            {% else %}
                {% set next_rate = ks.segment_rates_c_per_hr[next_step - 1] | float %}
                {% set current_sp = ks.setpoint_c | float %}
                SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_step VALUE={next_step}
                SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_start_setpoint_c VALUE={current_sp}
                SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_start_time VALUE={now}
                {% if next_rate == 0 %}
                    KILN_SET_STATE STATE=cooling
                {% else %}
                    KILN_SET_STATE STATE=firing
                    _KILN_SEGMENT_MELODY
                {% endif %}
            {% endif %}
        {% endif %}
    {% endif %}
    # Reschedule while a program is still active
    {% if st in ['firing', 'holding', 'cooling'] %}
        UPDATE_DELAYED_GCODE ID=_KILN_RUNNER DURATION=1
    {% endif %}

[gcode_macro KILN_ABORT]
description: Abort the running program. Stops the runner, opens estop,
  flashes feedback (beep + LEDs + display), then settles back to idle.
gcode:
    UPDATE_DELAYED_GCODE ID=_KILN_RUNNER DURATION=0
    KILN_ESTOP
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=setpoint_c VALUE=0
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_name VALUE='""'
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_step VALUE=0
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_total VALUE=0
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_rates_c_per_hr VALUE="[]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_targets_c VALUE="[]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_holds_s VALUE="[]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_names VALUE="[]"
    # Acknowledge the abort across three channels so the operator knows
    # the press was registered. The neopixel + display revert to idle
    # state via _KILN_ABORT_CLEAR after 1.5 s.
    _KILN_ABORT_MELODY
    SET_LED LED=fysetc_mini12864 RED=1.0 GREEN=1.0 BLUE=1.0
    SET_DISPLAY_GROUP GROUP=_aborted
    UPDATE_DELAYED_GCODE ID=_KILN_ABORT_CLEAR DURATION=1.5

[delayed_gcode _KILN_ABORT_CLEAR]
gcode:
    KILN_SET_STATE STATE=idle

# Emergency stop. Bypasses state machine — just kills outputs.
# Used as the primitive inside KILN_ABORT and KILN_FAULT, and callable
# directly from the gcode console when needed. The contactor opening
# physically cuts mains; the heater target=0 takes the SSR low on the
# next control cycle.
[gcode_macro KILN_ESTOP]
description: Emergency stop — heater target 0, contactor open.
gcode:
    SET_HEATER_TEMPERATURE HEATER=kiln TARGET=0
    SET_PIN PIN=contactor_coil VALUE=0
