# Safety layer — fault trigger + sensor watchdog + verify_heater override.
#
# KILN_FAULT is the public way to declare "something is wrong" — both manual
# (gcode console) and automated (watchdog) callers go through it.
#
# _KILN_FAULT_WATCHDOG polls sensors every 5s and trips KILN_FAULT before
# Klipper's hard [temperature_sensor] limits force a catastrophic MCU
# shutdown. The hard limits stay as a last-resort backstop.
#
# Soft limits (this watchdog):
#   chamber  > 1250°C  →  "Chamber overtemp"
#   chamber  < -10°C   →  "Chamber TC reading invalid"
#   heatsink > 80°C    →  "SSR heatsink overheat"
#
# Hard limits (set in sensors.cfg, trigger MCU shutdown):
#   chamber:  -50 to 1300°C
#   heatsink: -20 to 150°C
#
# verify_heater override: Klipper's defaults (max_error=120, gain_time=20s,
# heating_gain=2°C, hysteresis=5°C) are tuned for low-mass hotends. A kiln
# ramping at 200-400°C/hr can lag setpoint by >120°C transiently and may
# take minutes to register 2°C of gain near target. The numbers below
# accept those realities while still catching genuine failures (dead
# element, open TC, stuck SSR).

[verify_heater kiln]
max_error: 250
check_gain_time: 180
heating_gain: 1
hysteresis: 10

[gcode_macro KILN_FAULT]
description: Trip fault state. Sets fault_msg, switches display to fault view,
  and runs the emergency stop sequence. Usage: KILN_FAULT MESSAGE="TC1 open"
gcode:
    {% set msg = params.MESSAGE|default("Unknown fault")|string %}
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=fault_msg VALUE='"{msg}"'
    KILN_ESTOP
    _KILN_FAULT_MELODY
    KILN_SET_STATE STATE=fault

[delayed_gcode _KILN_FAULT_WATCHDOG]
initial_duration: 5
gcode:
    {% set c = printer["heater_generic kiln"].temperature %}
    {% set h = printer["temperature_sensor ssr_heatsink"].temperature %}
    {% set s = printer["gcode_macro _KILN_STATE"].state %}
    {% if s != 'fault' %}
        {% if c > 1250 %}
            KILN_FAULT MESSAGE="Chamber overtemp"
        {% elif c < -10 %}
            KILN_FAULT MESSAGE="Chamber TC invalid"
        {% elif h > 80 %}
            KILN_FAULT MESSAGE="SSR heatsink overheat"
        {% endif %}
    {% endif %}
    UPDATE_DELAYED_GCODE ID=_KILN_FAULT_WATCHDOG DURATION=5
