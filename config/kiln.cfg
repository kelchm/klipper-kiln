# Kiln controller — main entry point.
#
# This file holds the base Klipper sections that SAVE_CONFIG must be able to
# write to (notably any future [heater_generic] with PID values). Everything
# else lives in includes alongside this file. See README for the layout map.
#
# MCUs:
#   [mcu]      = Voron Klipper Expander (3A MOSFET outputs + thermistor inputs)
#   [mcu host] = Pi linux-process MCU (exposes /dev/spidev0.0 for MAX31856)
#   [mcu menu] = STM32_Mini12864 adapter (LCD + encoder + LEDs + beeper)

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f042x6_240005000143534133343520-if00

[mcu host]
serial: /tmp/klipper_host_mcu

[mcu menu]
serial: /dev/serial/by-id/usb-Klipper_stm32f042x6_260023001243535031303120-if00

[printer]
kinematics: none
max_velocity: 1
max_accel: 1

[virtual_sdcard]
path: ~/kiln_data/gcodes

[display_status]
[pause_resume]

# A kiln holds a fixed target for hours with no toolhead motion, so Klipper's
# default idle_timeout gcode (TURN_OFF_HEATERS + M84) would kill an active fire.
# Override it to turn heaters off ONLY when the kiln is not actively firing —
# an active fire or manual hold is never cut. (A running program's per-tick
# commands keep the timer from firing anyway; a manual hold sets state=firing,
# so the state check protects it.) No steppers here, so M84 (disable steppers)
# does nothing and is omitted. Runaway safety is the fault watchdog +
# verify_heater + thermal fuse, not idle_timeout.
[idle_timeout]
timeout: 600
gcode:
    {% if printer["gcode_macro _KILN_STATE"].state not in ['firing', 'holding', 'cooling'] %}
        TURN_OFF_HEATERS
    {% endif %}

######################################################################
# Includes — ordered for readability, not because Klipper requires it
######################################################################

[include sensors.cfg]
[include outputs.cfg]

[include display.cfg]
[include screens/*.cfg]
[include display-menu.cfg]
[include glyphs.cfg]
[include big-digits.generated.cfg]

[include state-machine.cfg]

[include program-runner.cfg]
[include programs/*.cfg]

[include safety.cfg]
[include feedback.cfg]

[include network.cfg]
