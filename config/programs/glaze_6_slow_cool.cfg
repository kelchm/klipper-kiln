# Glaze ^6 (Slow Cool) — cone 6 oxidation glaze firing with controlled
# cooling, ~17 hours.
# Same peak/heating as Glaze ^6 Durable, plus a controlled slow-cool
# segment that improves surface quality on reactive and matte glazes
# (micro-crystals need time to develop during the 1149→760 °C / 2100→1400 °F
# window). Use this when glaze appearance matters more than turnaround.
#
# Schedule: Plainsman C6DHSC drop-and-hold + slow cool, unchanged.
#
# Segments (°F for reference; stored as °C):
#   1. 108°F/hr → 250°F,  hold 1h    — preheat
#   2. 350°F/hr → 2100°F, hold 15m   — climb + soak to clear bubbles
#   3. 108°F/hr → 2200°F, hold 10m   — slow approach to cone 6
#   4. 900°F/hr → 2100°F, hold 30m   — drop-and-hold
#   5. 150°F/hr → 1400°F, hold 0     — CONTROLLED SLOW COOL (heater active)
#   then freefall cool from 760 °C
#
# Note: step 5 is a DESCENDING ramp. The runner detects direction from
# the target's relationship to the starting setpoint and ramps the
# setpoint down at the specified rate — the heater stays online and the
# PID enforces the cooling rate.

[gcode_macro KILN_START_GLAZE_SLOWCOOL_06]
description: Start a cone 6 glaze firing with controlled slow cool — best
  surface quality for matte / reactive glazes. ~17 hours.
gcode:
    UPDATE_DELAYED_GCODE ID=_KILN_RUNNER DURATION=0
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_name VALUE='"Glaze ^6 SlowCool"'
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_total VALUE=5
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_rates_c_per_hr VALUE="[60, 194, 60, 500, 83]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_targets_c VALUE="[121, 1149, 1204, 1149, 760]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_holds_s VALUE="[3600, 900, 600, 1800, 0]"
    _KILN_PROGRAM_START
