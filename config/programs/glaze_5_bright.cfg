# Glaze ^5 (Bright) — cone 5 oxidation glaze firing, ~9 hours.
# Peak chosen for best Kiwi underglaze color (brightest at cone 4-5) and
# best surface on 112 Brown clay (best color at cone 5). 240/240G white
# throwing bodies will be slightly under-vitrified at cone 5 — use the
# Glaze ^6 (Durable) program if full vitrification matters for the piece.
#
# Schedule structure: Plainsman C04PLTP drop-and-hold pattern, with peak
# adjusted from 1940°F (cone 04) up to 2135°F (cone 5).
#
# Segments (°F for reference; stored as °C):
#   1. 100°F/hr → 250°F, hold 1h    — preheat
#   2. 350°F/hr → 2050°F, hold 0    — main climb (fast)
#   3. 100°F/hr → 2135°F, hold 10m  — slow approach to cone 5
#   4. 900°F/hr → 2050°F, hold 30m  — drop-and-hold (heals pinholes/blisters)
#   then freefall cool

[gcode_macro KILN_START_GLAZE_BRIGHT_05]
description: Start a cone 5 glaze firing — best color for Kiwi underglaze
  and 112 Brown clay. ~9 hours.
gcode:
    UPDATE_DELAYED_GCODE ID=_KILN_RUNNER DURATION=0
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_name VALUE='"Glaze ^5 Br"'
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_total VALUE=4
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_rates_c_per_hr VALUE="[56, 194, 56, 500]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_targets_c VALUE="[121, 1121, 1168, 1121]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_holds_s VALUE="[3600, 0, 600, 1800]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_names VALUE='["Preheat", "Climb", "At cone", "Anneal"]'
    _KILN_PROGRAM_START
