# Bisque ^06 — sculpture/hand-built default. Adapted from Plainsman BQ1000
# with slower ramp through carbon-burnout and quartz inversion (1063°F /
# 573°C) zones to handle thick walls and damp greenware safely.
#
# Total time: ~28-32 hours including 6h candling preheat.
# Compatible with: all four Standard clays (112 Brown, 240/240G White,
# 420 Sculpture) and prepares pieces for Kiwi underglaze + clear glaze.
#
# Segments (°F shown for reference; stored as °C):
#   1. 60°F/hr → 200°F, hold 6h    — candling / water smoke
#   2. 80°F/hr → 600°F, hold 0     — organic carbon burnout (slow)
#   3. 100°F/hr → 1100°F, hold 0   — quartz inversion zone (slow)
#   4. 150°F/hr → 1700°F, hold 0   — inorganic carbon + sulfur burnout
#   5. 108°F/hr → 1828°F, hold 30m — slow approach to cone 06
#   then freefall cool
#
# Warnings:
# - Vent must be partially open through carbon burnout (steps 1-4) for
#   complete oxidation. Closed kiln = black coring and bloating later.
# - If 112 Brown clay is in the load, run room ventilation continuously
#   (manganese fumes during firing).
# - For very thick/damp work, run KILN_START_TEST first to verify the
#   loop is healthy, then leave the kiln on this program — the 6h candle
#   gives substantial margin but extreme cases (1"+ walls, recently
#   trimmed) may want a separate overnight candle before starting.

[gcode_macro KILN_START_BISQUE_06]
description: Start the sculpture-default bisque firing (~30h to cone 06).
gcode:
    UPDATE_DELAYED_GCODE ID=_KILN_RUNNER DURATION=0
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_name VALUE='"\x1e06Bisque"'
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_total VALUE=5
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_rates_c_per_hr VALUE="[33, 44, 56, 83, 60]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_targets_c VALUE="[93, 316, 593, 927, 998]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_holds_s VALUE="[21600, 0, 0, 0, 1800]"
    _KILN_PROGRAM_START
