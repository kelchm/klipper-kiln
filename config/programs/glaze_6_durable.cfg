# Glaze ^6 (Durable) — cone 6 oxidation glaze firing, ~10 hours.
# Peak chosen for full vitrification of 240 / 240G white throwing bodies
# (rated cone 6, 1.5% absorption). Best schedule for functional pottery
# that needs water-tightness and durability.
#
# Schedule: Plainsman PLC6DS drop-and-soak, unchanged structure.
#
# Segments (°F for reference; stored as °C):
#   1. 108°F/hr → 250°F, hold 1h    — preheat
#   2. 350°F/hr → 2100°F, hold 0    — main climb
#   3. 108°F/hr → 2200°F, hold 10m  — slow approach to cone 6
#   4. 900°F/hr → 2100°F, hold 30m  — drop-and-hold (heals pinholes/blisters)
#   then freefall cool

[gcode_macro KILN_START_GLAZE_6_DURABLE]
description: Start a cone 6 glaze firing — durable / fully-vitrified.
  Best for functional pottery on 240 / 240G white throwing bodies. ~10 hours.
gcode:
    UPDATE_DELAYED_GCODE ID=_KILN_RUNNER DURATION=0
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_name VALUE='"Glaze ^6 Durable"'
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_total VALUE=4
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_rates_c_per_hr VALUE="[60, 194, 60, 500]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_targets_c VALUE="[121, 1149, 1204, 1149]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_holds_s VALUE="[3600, 0, 600, 1800]"
    _KILN_PROGRAM_START
