# Canned test program — short, low-temp, no real heat needed.
#
# Demo path: idle → firing (ramp setpoint to 100°F over ~20s)
#         → holding (hold at 100°F for 20s)
#         → complete
#
# Because no actual heat is applied (Phase 1 stub), the chamber stays at
# room temp. The setpoint will visibly diverge from chamber — that's
# expected. We're testing screen flow, not thermal behavior.

[gcode_macro KILN_START_TEST]
description: Start the canned test program. Sets up a fast ramp+hold so
  the state transitions are visible within ~40 seconds. Forgiving: if a
  program is already running, aborts it and starts a fresh one.
gcode:
    # Cancel any in-flight runner so we start with a clean slate.
    UPDATE_DELAYED_GCODE ID=_KILN_RUNNER DURATION=0
    {% set now = printer.toolhead.estimated_print_time %}
    {% set chamber_c = printer["temperature_sensor kiln_chamber"].temperature %}
    # 100°F target ≈ 37.78°C. Rate set so ramp from room temp completes
    # in ~20s regardless of starting chamber temp (room ≈ 22°C, so 16°C
    # in 20s ≈ 2880°C/hr).
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_step VALUE=1
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_total VALUE=1
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=step_rate_c_per_hr VALUE=2880
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=step_target_c VALUE=37.78
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=step_hold_seconds VALUE=20
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_start_time VALUE={now}
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_start_time VALUE={now}
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_start_setpoint_c VALUE={chamber_c}
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=setpoint_c VALUE={chamber_c}
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=peak_c VALUE={chamber_c}
    KILN_SET_STATE STATE=firing
    _KILN_START_MELODY
    UPDATE_DELAYED_GCODE ID=_KILN_RUNNER DURATION=1
