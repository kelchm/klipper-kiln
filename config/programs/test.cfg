# Multi-segment validation test program — exercises the closed loop AND the
# program runner's segment-advancement logic across all three segment shapes
# (ramp up, ramp down, cool-wait).
#
# Path: idle → firing/holding ×4 → cooling → complete
#
# Segments:
#   1. ramp to 30°C, hold 5s   (gentle up from room temp)
#   2. ramp to 40°C, hold 5s   (further up)
#   3. ramp to 30°C, hold 5s   (DOWN — exercises descending ramp)
#   4. ramp to 38°C, hold 10s  (final heated segment)
#   5. cool-wait to 25°C        (rate=0 — passive cool, advances on chamber)
#
# Cool-wait threshold (25°C) is set just above typical bench room temp so the
# segment advances within one or two runner ticks during the test — enough
# to validate the path and let the operator see the cooling screen flash by.
# Real programs will use ~150°C (302°F) and actually wait hours.
#
# Total: ~30-45 s depending on starting temp.

[gcode_macro KILN_START_TEST]
description: Start the multi-segment test program. Forgiving — if a program
  is already running, aborts it and starts a fresh one.
gcode:
    UPDATE_DELAYED_GCODE ID=_KILN_RUNNER DURATION=0
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_name VALUE='"Test"'
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_total VALUE=5
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_rates_c_per_hr VALUE="[2880, 2880, 2880, 2880, 0]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_targets_c VALUE="[30, 40, 30, 38, 25]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_holds_s VALUE="[5, 5, 5, 10, 0]"
    _KILN_PROGRAM_START
