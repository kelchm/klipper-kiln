# Multi-segment validation test program — short, low-temp, exercises the
# closed loop AND the program runner's segment-advancement logic.
#
# Path: idle → firing/holding ×4 → complete
#
# Segments (all at 2880 °C/hr — fast enough to converge in seconds):
#   1. ramp to 30°C, hold 5s    (gentle up from room temp)
#   2. ramp to 40°C, hold 5s    (further up)
#   3. ramp to 30°C, hold 5s    (DOWN — tests descending ramp)
#   4. ramp to 38°C, hold 10s   (final hold then complete)
#
# Total: ~30-45 seconds depending on starting temp. Safe to run with the
# contactor closed — peak ~40°C is below the runbook §2 sanity-check.

[gcode_macro KILN_START_TEST]
description: Start the multi-segment test program. Forgiving — if a program
  is already running, aborts it and starts a fresh one.
gcode:
    UPDATE_DELAYED_GCODE ID=_KILN_RUNNER DURATION=0
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_name VALUE='"Test"'
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_total VALUE=4
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_rates_c_per_hr VALUE="[2880, 2880, 2880, 2880]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_targets_c VALUE="[30, 40, 30, 38]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_holds_s VALUE="[5, 5, 5, 10]"
    _KILN_PROGRAM_START
