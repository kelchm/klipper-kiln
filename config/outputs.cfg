# Power outputs + their user-facing control macros.
#
# Pin map per the canonical Voron Klipper Expander config
# (Voron-Hardware/Klipper_Expander/Software/klipperExpander.cfg):
#   M0 = PA0, M1 = PA1, M2 = PA2, M3 = PA3 (3A MOSFET outputs)
#   T0 = PA6, T1 = PA5 (thermistor inputs — T0 in use by sensors.cfg)
#   PA4 = onboard status LED, PA7 = spare GPIO, PB1 = onboard neopixel
#
#   M0 = PA0 → SSR gate (Altran ASR-SI480D40ZW-L, zero-cross)
#   M1 = PA1 → contactor coil driver (Omron G7L)

# SSR + chamber TC are bundled into a single heater so Klipper's control
# loop can drive duty cycle. pwm_cycle_time=0.3s is the heater_generic
# maximum (vs output_pin which allowed 1.0); still ~18 line zero-crosses
# per cycle at 60Hz, comfortable for the zero-cross SSR. Watermark is a
# stable placeholder; PID values land here via SAVE_CONFIG after
# PID_CALIBRATE runs.
[heater_generic kiln]
heater_pin: PA0
max_power: 1.0
pwm_cycle_time: 0.3
sensor_type: MAX31856
sensor_pin: host:gpio8
spi_bus: spidev0.0
tc_type: K
tc_use_50Hz_filter: False
tc_averaging_count: 1
control: watermark
# Tighter than the 2.0 default so slow ramps don't sit idle for minutes
# waiting for setpoint to climb past the hysteresis band.
max_delta: 0.5
min_temp: -50
max_temp: 1300

# Contactor coil: strictly digital. The contactor exists as an independent
# disconnect; PWM here would chatter the contacts.
[output_pin contactor_coil]
pin: PA1
value: 0
shutdown_value: 0

######################################################################
# Manual control macros
######################################################################

# Bench overrides — thin wrappers around SET_HEATER_TEMPERATURE.
# SSR_ON targets 80°C (runbook §2 sanity-check temp) rather than max,
# so a stray SSR_ON with the contactor energized doesn't drive toward
# 1300°C unbounded. For specific targets, use SET_HEATER_TEMPERATURE
# directly.
[gcode_macro SSR_ON]
description: Bench override — hold chamber at 80°C via the control loop.
gcode: SET_HEATER_TEMPERATURE HEATER=kiln TARGET=80

[gcode_macro SSR_OFF]
description: Drop chamber target to 0°C (heater idles).
gcode: SET_HEATER_TEMPERATURE HEATER=kiln TARGET=0

[gcode_macro COIL_ON]
description: Energize contactor coil (closes mains to SSR side).
gcode: SET_PIN PIN=contactor_coil VALUE=1

[gcode_macro COIL_OFF]
description: De-energize contactor coil (opens mains).
gcode: SET_PIN PIN=contactor_coil VALUE=0
