# Power outputs + their user-facing control macros.
#
# Pin map per the canonical Voron Klipper Expander config
# (Voron-Hardware/Klipper_Expander/Software/klipperExpander.cfg):
#   M0 = PA0, M1 = PA1, M2 = PA2, M3 = PA3 (3A MOSFET outputs)
#   T0 = PA6, T1 = PA5 (thermistor inputs — T0 in use by sensors.cfg)
#   PA4 = onboard status LED, PA7 = spare GPIO, PB1 = onboard neopixel
#
#   M0 = PA0 → SSR gate (Altran ASR-SI480D40ZW-L, zero-cross)
#   M1 = PA1 → contactor coil driver (Omron G7L)

# SSR + chamber TC are bundled into a single heater so Klipper's control
# loop can drive duty cycle. pwm_cycle_time=0.3s is the heater_generic
# maximum (vs output_pin which allowed 1.0); still ~18 line zero-crosses
# per cycle at 60Hz, comfortable for the zero-cross SSR. Watermark is a
# stable placeholder; PID values land here via SAVE_CONFIG after
# PID_CALIBRATE runs.
#
# DEPENDENCY: this heater drives the SSR (PA0). The SSR is electrically
# downstream of [output_pin contactor_coil] below — without the coil
# energized, mains is open at the SSR input and any duty Klipper commands
# is a no-op. Klipper has no formal "output depends on output" concept,
# so the dependency is enforced procedurally: KILN_SET_STATE auto-closes
# the coil for firing/holding/cooling and auto-opens it otherwise.
[heater_generic kiln]
heater_pin: PA0
max_power: 1.0
pwm_cycle_time: 0.3
sensor_type: MAX31856
sensor_pin: host:gpio8
spi_bus: spidev0.0
tc_type: K
tc_use_50Hz_filter: False
tc_averaging_count: 1
control: watermark
# Tighter than the 2.0 default so slow ramps don't sit idle for minutes
# waiting for setpoint to climb past the hysteresis band.
max_delta: 0.5
min_temp: -50
max_temp: 1300

# Contactor coil: strictly digital. The contactor exists as an independent
# disconnect; PWM here would chatter the contacts. Auto-managed by
# KILN_SET_STATE — see the dependency note on [heater_generic kiln] above.
# COIL_ON / COIL_OFF macros below remain available for bench testing.
[output_pin contactor_coil]
pin: PA1
value: 0
shutdown_value: 0

######################################################################
# Manual control macros
######################################################################

# Bench overrides — thin wrappers around SET_HEATER_TEMPERATURE.
# SSR_ON targets 80°C (runbook §2 sanity-check temp) rather than max,
# so a stray SSR_ON with the contactor energized doesn't drive toward
# 1300°C unbounded. For specific targets, use SET_HEATER_TEMPERATURE
# directly.
[gcode_macro SSR_ON]
description: Bench override — hold chamber at 80°C via the control loop.
gcode: SET_HEATER_TEMPERATURE HEATER=kiln TARGET=80

[gcode_macro SSR_OFF]
description: Drop chamber target to 0°C (heater idles).
gcode: SET_HEATER_TEMPERATURE HEATER=kiln TARGET=0

[gcode_macro COIL_ON]
description: Energize contactor coil (closes mains to SSR side).
gcode: SET_PIN PIN=contactor_coil VALUE=1

[gcode_macro COIL_OFF]
description: De-energize contactor coil (opens mains).
gcode: SET_PIN PIN=contactor_coil VALUE=0

# Supervised manual hold (bench / testing / characterization). Unlike a
# program, this drives a FIXED target indefinitely with no runner. It exists
# because raw COIL_ON + SET_HEATER_TEMPERATURE has two footguns that bit us
# during testing:
#   1. Using KILN_ABORT to (re)start a manual drive: KILN_ABORT schedules
#      _KILN_ABORT_CLEAR 1.5s later, which calls KILN_SET_STATE idle and
#      RE-OPENS the contactor — silently undoing a COIL_ON issued right after.
#      This macro closes the coil via KILN_SET_STATE firing (no abort, no race).
#   2. Klipper's default [idle_timeout] (600s) runs TURN_OFF_HEATERS, zeroing
#      the heater mid-hold (a program's per-tick commands reset the timer, but a
#      manual hold has no activity and dies). Fixed at the source: the
#      [idle_timeout] gcode in kiln.cfg skips TURN_OFF_HEATERS while
#      firing/holding/cooling, and this macro sets state=firing.
# Stop with KILN_MANUAL_OFF (or KILN_ESTOP for an immediate cut).
[gcode_macro KILN_MANUAL]
description: Supervised manual hold at a fixed temperature (bench/testing).
  Closes the contactor and drives the heater to target, shows the firing screen.
  Stop with KILN_MANUAL_OFF. Usage: KILN_MANUAL C=1220 or KILN_MANUAL F=2232.
gcode:
    {% if 'F' in params %}
        {% set c = (params.F|float - 32.0) * 5.0/9.0 %}
    {% elif 'C' in params %}
        {% set c = params.C|float %}
    {% else %}
        { action_raise_error("Need C=<celsius> or F=<fahrenheit>") }
    {% endif %}
    # Stop any running program AND clear its state so this hold is a clean
    # "firing, no program" (mirrors KILN_ABORT's reset). Without this, a hold
    # started from a completed program leaves program_step/total/name/segments
    # stale — the firing screen shows the finished program and the __settarget
    # live-adjust menu (gated on program_step == 0) never appears.
    UPDATE_DELAYED_GCODE ID=_KILN_RUNNER DURATION=0
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_name VALUE='""'
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_step VALUE=0
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=program_total VALUE=0
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_rates_c_per_hr VALUE="[]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_targets_c VALUE="[]"
    SET_GCODE_VARIABLE MACRO=_KILN_STATE VARIABLE=segment_holds_s VALUE="[]"
    # Close the contactor + firing screen (NOT via KILN_ABORT — see note above).
    # state=firing also tells [idle_timeout] not to cut the heater on this hold.
    KILN_SET_STATE STATE=firing
    KILN_SET_SETPOINT C={c}
    SET_HEATER_TEMPERATURE HEATER=kiln TARGET={c}

[gcode_macro KILN_MANUAL_OFF]
description: End a manual hold — heater off, contactor open, back to idle.
gcode:
    SET_HEATER_TEMPERATURE HEATER=kiln TARGET=0
    KILN_SET_STATE STATE=idle
